### EComCareLM 的 LLaMA-Factory SFT 配置锚点。
### 真实训练前需要更新 model_name_or_path 和数据集路径。
stage: sft
do_train: true
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
dataset: ecomcarelm_sft
template: qwen
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
learning_rate: 0.0001
num_train_epochs: 2
cutoff_len: 2048
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
output_dir: outputs/ecomcarelm-sft-lora
